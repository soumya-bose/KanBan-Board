<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban Board</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Polyfill for touch drag and drop -->
    <link rel="stylesheet" href="https://unpkg.com/mobile-drag-drop@2.3.0-rc.2/default.css">
    <script src="https://unpkg.com/mobile-drag-drop@2.3.0-rc.2/index.min.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1 class="main-title">Kanban Board</h1>
    </header>
    <main>
      <section class="board">
        <!-- TO DO -->
        <div class="column" id="todo-column">
          <div class="column-header">
            <h2 class="todo-title">To Do <span class="count todo-count-bg" id="todo-count">0</span></h2>
          </div>
          <div class="task-list" id="todo" data-status="todo">
            <!-- Tasks will go here -->
          </div>
          <div class="add-task-container">
            <input type="text" class="add-task-input" id="todo-input" autocomplete="off" placeholder="Add a new task..." />
            <button class="add-task-btn todo-btn" data-status="todo">Add Task</button>
          </div>
        </div>

        <!-- IN PROGRESS -->
        <div class="column" id="progress-column">
          <div class="column-header">
            <h2 class="progress-title">In Progress <span class="count progress-count-bg" id="progress-count">0</span></h2>
          </div>
          <div class="task-list" id="progress" data-status="progress">
            <!-- Tasks will go here -->
          </div>
          <div class="add-task-container">
            <input type="text" class="add-task-input" id="progress-input" autocomplete="off" placeholder="Add a new task..." />
            <button class="add-task-btn progress-btn" data-status="progress">Add Task</button>
          </div>
        </div>

        <!-- COMPLETED -->
        <div class="column" id="done-column">
          <div class="column-header">
            <h2 class="done-title">Completed <span class="count done-count-bg" id="done-count">0</span></h2>
          </div>
          <div class="task-list" id="done" data-status="done">
            <!-- Tasks will go here -->
          </div>
          <div class="add-task-container">
            <input type="text" class="add-task-input" id="done-input" autocomplete="off" placeholder="Add a new task..." />
            <button class="add-task-btn done-btn" data-status="done">Add Task</button>
          </div>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
