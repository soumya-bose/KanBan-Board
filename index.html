<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kan Ban Board</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  </head>
  <body>
    <main>
      <nav>
        <div class="left">Kanban Board</div>
        <div class="right"><button id="toggle-modal">Add New Task</button></div>
      </nav>
      <section>
        <div id="todo" class="task-column">
          <div class="heading">
            <div class="left">To Do</div>
            <div class="right">Count : 0</div>
          </div>
          <div class="task" draggable="true">
            <h2>Task 1</h2>
            <p>This is a sample task description.</p>
            <button>Delete</button>
          </div>
        </div>
        <div id="in-progress" class="task-column">
          <div class="heading">
            <div class="left">In Progress</div>
            <div class="right">Count : 0</div>
          </div>
        </div>
        <div id="done" class="task-column">
          <div class="heading">
            <div class="left">Done</div>
            <div class="right">Count : 0</div>
          </div>
        </div>
      </section>
    </main>

    <div class="modal add-new-task">
      <div class="bg"></div>
      <div class="center"> 
        <h2>Add New Task</h2>
        <form  class="center">
          <i class="fa-solid fa-xmark" style="color: #38e20d; cursor: pointer; position: absolute; top: 15px; right: 15px;"></i>
          <input type="text" id="task-title-input" name="task-title-input" placeholder="Task Title" />
          <textarea id="task-description-input" name="task-description-input" placeholder="Task Description"></textarea>
          <button id="add-new-task" type="submit">Add Task</button>
        </form>
      </div>
    </div>


    <script src="script.js"></script>
  </body>
</html>
